<!DOCTYPE html>
<html>
<head>
    <title>Safelle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Login Page -->
    <div id="loginPage" class="page">
        <h1>Safelle 🚕</h1>
        <input type="text" placeholder="Enter Name" id="username">
        <p id="errorMsg" style="color:red;"></p>
        <button onclick="goToBooking()">Login</button>
    </div>

    <!-- Booking Page -->
    <div id="bookingPage" class="page hidden">
        <h2>Book a Ride</h2>
          <input type="text" id="pickup" placeholder="Pickup Location">
    <input type="text" id="destination" placeholder="Destination">
    <button onclick="searchCabs()">Search Cabs</button>
    <div id="cabList"></div>
    </div>

    <!-- Ride Tracking Page -->
    <div id="ridePage" class="page hidden">
        <div id="map"> 
            <iframe src="file:///C:/Users/sumad/AppData/Local/Packages/5319275A.WhatsAppDesktop_cv1g1gvanyjgm/LocalState/sessions/83762A6F609F541B706A8A1B871863A06B1F520A/transfers/2026-14/index%20(4).html" width="100%" height="400px">
            </iframe>
        </div>
        <button onclick="cancelRide()">Cancel Ride</button>
        <h2>Ride in Progress 🚗</h2>
        <p id="status">Tracking your ride...</p>
        <p id="rideDetails"></p>
         <h2>Enter Rider Details</h2>
    <form onsubmit="checkVehicle(event)">
        <!-- Vehicle Number -->
        <label for="vehicleNumber">Vehicle Number:</label><br>
        <input type="text" id="vehicleNumber" name="vehicleNumber" placeholder="Enter vehicle number" required><br><br>
        <p id="vehicleError" style="color:red;"></p>
        <!-- Submit Button -->
         <button type="submit">Submit</button>
    </form>
    <button onclick="shareRide()">Share Ride</button>
    <button onclick="fakeCall()">Fake Call 📞</button>
    <p id="safetyStatus">Status: Safe ✅</p>
        <button id="sosBtn" onclick="openTimer()">SOS 🚨</button>
    </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
